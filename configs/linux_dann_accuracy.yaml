# Linux formal DANN variant with accuracy-first checkpoint selection.
preprocess_version: "v2.1"
data_root: "data"
raw_data_root: "/data/WiFiPose/dataset/dataset"
aoa_cache_root: "/data/WiFiPose/dataset/AOA_data"
labels_root: "/data/WiFiPose/dataset/dataset"
splits_root: "splits"
logs_root: "logs"
checkpoints_root: "checkpoints"

aoa:
  bins: 181
  use_tof: false

h5:
  frames_per_sample: 297
  compression: "gzip"
  compression_level: 4
  chunk_frames: 32
  write_atomic: true

verify:
  require_frame_count: 297
  skip_bad_samples: true
  bad_samples_log: "data/bad_samples.log"
  compute_sha256: true

dataset:
  input_channels: 1
  input_length: 181
  window_size: 1
  batch_size: 64
  num_workers: 8
  pin_memory: true
  cache_in_memory: false

augmentation:
  enable: true
  prob_noise: 0.5
  noise_std: 0.02
  prob_gain: 0.3
  gain_range: [0.8, 1.2]
  prob_bin_dropout: 0.2
  max_dropout_bins: 5
  aoa_shift_bins: 1

model:
  name: "resnet1d"
  input_channels: 1
  input_length: 181
  hidden_dim: 256
  dropout: 0.2
  output_joints: 17
  output_dim: 2

train:
  device: "cuda:0"
  seed: 42
  epochs: 100
  optimizer: "AdamW"
  lr: 3e-4
  weight_decay: 1e-4
  grad_clip: 1.0
  lr_scheduler:
    name: "cosine"
    warmup_epochs: 5

loss:
  normalize_mode: "mean_rms"
  lambda_pose: 1.0
  lambda_dir: 1.0
  lambda_angle: 0.5
  lambda_len: 1.0
  lambda_sym: 0.1
  lambda_reg: 0.01
  lambda_var: 0.0
  lambda_batch_div: 0.0
  batch_div_schedule:
    enable: false
    name: "rise_fall"
    start: 0.3
    peak: 0.6
    end: 0.4
    peak_epoch_ratio: 0.4
  lambda_inter_div: 0.0
  inter_div_schedule:
    enable: true
    name: "rise_fall"
    start: 0.25
    peak: 0.55
    end: 0.35
    peak_epoch_ratio: 0.45
  lambda_intra_div: 0.0
  intra_div_schedule:
    enable: false
    name: "fixed"
    start: 0.0
  preserve_ratio: 0.6
  huber_delta: 1.0

action_aux:
  enable: true
  num_actions: 27
  lambda_cls: 0.2
  dropout: 0.1

domain_adaptation:
  use_dann: true
  use_mmd: false
  lambda_domain: 0.1

eval:
  metrics:
    - "N-MPJPE"
    - "TorsoOrientationError"
    - "BoneCosine"
    - "JointAngleRMSE"
    - "PCK"
  pck_thresholds: [0.05, 0.1]

checkpoint:
  save_top_k: 3
  monitor: "val/N-MPJPE"
  mode: "min"
  save_interval_epochs: 1
  resume: false
  resume_checkpoint: ""
  save_path: "checkpoints/linux_dann_accuracy_ckpt.pth"
  selection:
    mode: "accuracy"
    pair_ratio_weight: 1.0
    std_ratio_weight: 0.35
    inter_pair_ratio_weight: 0.15
    nmpjpe_penalty: 0.02

logging:
  use_wandb: false
  wandb_project: "wifi_aoa_pose"
  log_interval_steps: 10
  run_name: "linux_dann_accuracy"

splits:
  protocol: "LOEO"
  folds: 4
  splits_dir: "splits"
  sample_env_rule:
    group_size: 10
    env_prefix: "env"

misc:
  verbose: true
  deterministic: false
